<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Maharvi Account System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Josefin+Sans:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Josefin Sans',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#c8b6a6,#e8d8c8,#d2b9a5);
}

.container{
width:95%;
max-width:420px;
padding:40px 30px;
border-radius:18px;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(15px);
box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

h2{
font-family:'Playfair Display',serif;
text-align:center;
color:#7a3e22;
margin-bottom:25px;
}

input{
width:100%;
padding:13px;
margin:10px 0;
border-radius:10px;
border:1px solid rgba(0,0,0,0.2);
outline:none;
}

button{
width:100%;
padding:13px;
margin-top:10px;
background:linear-gradient(45deg,#7a3e22,#4a2c2a);
color:#fff;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.switch{
text-align:center;
margin-top:20px;
cursor:pointer;
color:#7a3e22;
font-weight:600;
}
</style>
</head>
<body>

<div class="container">

<h2 id="formTitle">Login</h2>

<div id="loginForm">
<input type="email" id="loginEmail" placeholder="Email">
<input type="password" id="loginPass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="registerForm" style="display:none;">
<input type="text" id="regName" placeholder="Full Name">
<input type="email" id="regEmail" placeholder="Email">
<input type="text" id="regMobile" placeholder="Mobile Number">
<input type="text" id="regAddress" placeholder="Address">
<input type="text" id="regUserId" placeholder="Create User ID">
<input type="password" id="regPass" placeholder="Password">
<button onclick="register()">Register</button>
</div>

<div class="switch" onclick="toggleForm()">Create Account</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, setDoc, doc, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyBY4H5FkFv3I_1brQ5z8y84qZgxG-06_9c",
  authDomain: "maharviadmin1.firebaseapp.com",
  projectId: "maharviadmin1",
  storageBucket: "maharviadmin1.firebasestorage.app",
  messagingSenderId: "664921647469",
  appId: "1:664921647469:web:64a4ce71d1efebcb22d264"
};


const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


// Toggle Form
window.toggleForm = function(){
const login = document.getElementById("loginForm");
const register = document.getElementById("registerForm");
const title = document.getElementById("formTitle");
const switchText = document.querySelector(".switch");

if(login.style.display === "none"){
login.style.display = "block";
register.style.display = "none";
title.innerText = "Login";
switchText.innerText = "Create Account";
}else{
login.style.display = "none";
register.style.display = "block";
title.innerText = "Register";
switchText.innerText = "Back to Login";
}
}


// Register
window.register = async function(){

let name = regName.value.trim();
let email = regEmail.value.trim();
let mobile = regMobile.value.trim();
let address = regAddress.value.trim();
let userId = regUserId.value.trim();
let pass = regPass.value.trim();

if(!name || !email || !mobile || !address || !userId || !pass){
alert("Please fill all fields");
return;
}

try{

const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
const user = userCredential.user;

await setDoc(doc(db, "users", user.uid), {
  name:name,
  email:email,
  mobile:mobile,
  address:address,
  userId:userId,
  blocked:false
});

alert("Account Created Successfully!");
toggleForm();

}catch(error){
alert(error.message);
}

}


// Login
window.login = async function(){

let email = loginEmail.value.trim();
let pass = loginPass.value.trim();

try{

const userCredential = await signInWithEmailAndPassword(auth, email, pass);
const user = userCredential.user;

const docSnap = await getDoc(doc(db, "users", user.uid));

if(docSnap.exists()){

let data = docSnap.data();

if(data.blocked){
alert("Your Account is Blocked!");
return;
}

alert("Welcome " + data.name);
window.location.href="index.html";

}

}catch(error){
alert("Invalid Email or Password");
}

}

</script>

</body>
</html>
