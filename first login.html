<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Maharvi Saree - Login Options</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
background:#f4f4f4;
color:#222;
}

/* TOP BAR */

.topbar{
background:#e9e9e9;
padding:12px 50px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:14px;
flex-wrap:wrap;
}

/* LOGO */

.logo-section{
text-align:center;
padding:40px 20px 20px;
}

.logo{
font-size:64px;
font-weight:700;
letter-spacing:4px;
color:#6a1b9a;
}

.logo span{
color:#f9a825;
}

.tagline{
margin-top:10px;
font-size:18px;
letter-spacing:3px;
color:#6a1b9a;
}

/* NAVBAR */

.navbar-container{
position:relative;
border-top:1px solid #ccc;
border-bottom:1px solid #ccc;
background:#fff;
padding:20px 0;
}

.navbar{
display:flex;
justify-content:center;
gap:50px;
font-size:14px;
letter-spacing:2px;
transition:0.4s;
}

.navbar a{
text-decoration:none;
color:#444;
position:relative;
}

.navbar a::after{
content:'';
position:absolute;
width:0%;
height:2px;
background:#6a1b9a;
left:0;
bottom:-5px;
transition:0.3s;
}

.navbar a:hover::after{
width:100%;
}

.navbar a:hover{
color:#6a1b9a;
}

/* HAMBURGER */

.menu-toggle{
display:none;
position:absolute;
left:25px;
top:22px;
font-size:22px;
cursor:pointer;
color:#6a1b9a;
}

/* LOGIN SECTION */

.section-title{
text-align:center;
margin-top:60px;
font-size:32px;
letter-spacing:4px;
}

.section-line{
width:60%;
height:1px;
background:#ccc;
margin:20px auto 50px;
}

.login-buttons{
display:flex;
justify-content:center;
gap:40px;
margin-bottom:100px;
flex-wrap:wrap;
}

.login-btn{
background:#4a0c74;
color:#fff;
padding:20px 60px;
border-radius:6px;
text-decoration:none;
font-weight:600;
letter-spacing:1px;
transition:0.3s;
}

.login-btn:hover{
background:#360857;
transform:translateY(-4px);
box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

/* MOBILE RESPONSIVE */

@media(max-width:900px){

.topbar{
flex-direction:column;
gap:10px;
text-align:center;
padding:15px;
}

.logo{
font-size:40px;
}

.menu-toggle{
display:block;
}

.navbar{
flex-direction:column;
align-items:flex-start;
gap:25px;
padding:20px 30px;
position:absolute;
top:100%;
left:0;
width:100%;
background:#fff;
max-height:0;
overflow:hidden;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.navbar.active{
max-height:500px;
}

.login-buttons{
flex-direction:column;
align-items:center;
gap:25px;
}

.login-btn{
width:85%;
text-align:center;
}

.section-title{
font-size:24px;
}

}

</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
<div>Select Language</div>

<div>
<span>1-800-239-9948</span>
<span style="margin-left:20px;">LOG IN</span>
<span style="margin-left:20px;">🛒 CART (0)</span>
<span style="margin-left:20px;">CHECKOUT</span>
</div>
</div>

<!-- LOGO -->
<div class="logo-section">
<div class="logo">MAHAR<span>VI</span></div>
<div class="tagline">CREATED WITH TRADITION & STYLE</div>
</div>

<!-- NAVIGATION -->
<div class="navbar-container">

<div class="menu-toggle" onclick="toggleMenu()">
<i class="fas fa-bars"></i>
</div>

<div class="navbar" id="navMenu">
<a href="#">FIND YOUR STORE</a>
<a href="#">GET A FREE ONLINE STORE</a>
<a href="#">HOW IT WORKS</a>
<a href="#">BULK ORDERS</a>
<a href="#">FAQ</a>
<a href="#">DESIGN IDEAS</a>
<a href="#">CONTACT US</a>
</div>

</div>

<!-- LOGIN SECTION -->
<div class="section-title">
SELECT LOGIN OPTIONS
</div>

<div class="section-line"></div>

<div class="login-buttons">
<a href="login.html" class="login-btn">INDIVIDUAL PURCHASES LOGIN</a>
<a href="admin login.html" class="login-btn">GROUP STORE DASHBOARD LOGIN</a>
</div>

<script>
function toggleMenu(){
document.getElementById("navMenu").classList.toggle("active");
}
</script>

</body>
</html
