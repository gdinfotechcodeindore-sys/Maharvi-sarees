<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Maharvi Client Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Josefin Sans',sans-serif;
}

body{
background:#f4f6f9;
}

/* NAVBAR */

.navbar{
background:#7a3e22;
color:#fff;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
position:relative;
}

.logo{
font-size:18px;
font-weight:600;
}

.menu{
display:flex;
gap:25px;
align-items:center;
}

.menu a{
color:#fff;
text-decoration:none;
font-weight:500;
}

.menu a:hover{
text-decoration:underline;
}

.menu-btn{
display:none;
font-size:20px;
cursor:pointer;
}

/* MOBILE MENU */

.mobile-menu{
position:absolute;
top:60px;
left:0;
width:100%;
background:#7a3e22;
flex-direction:column;
display:none;
padding:15px 0;
}

.mobile-menu a{
padding:12px;
border-top:1px solid rgba(255,255,255,0.2);
}

/* CONTENT */

.container{
padding:30px;
max-width:1200px;
margin:auto;
}

.welcome{
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:25px;
}

.cards{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.card{
flex:1;
min-width:250px;
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}

.card i{
font-size:28px;
color:#7a3e22;
margin-bottom:10px;
}

.card h3{
margin-bottom:10px;
}

/* RESPONSIVE */

@media(max-width:768px){

.menu{
display:none;
}

.menu-btn{
display:block;
}

.mobile-menu.active{
display:flex;
}

}

</style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
<div class="logo">MAHARVI</div>

<div class="menu">
<a href="#"><i class="fas fa-home"></i> Home</a>
<a href="#"><i class="fas fa-user"></i> Profile</a>
<a href="#"><i class="fas fa-box"></i> Orders</a>
<a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<i class="fas fa-bars menu-btn" onclick="toggleMenu()"></i>

<div class="mobile-menu" id="mobileMenu">
<a href="#"><i class="fas fa-home"></i> Home</a>
<a href="#"><i class="fas fa-user"></i> Profile</a>
<a href="#"><i class="fas fa-box"></i> Orders</a>
<a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

</div>

<!-- CONTENT -->
<div class="container">

<div class="welcome">
<h2>Welcome, <span id="userName"></span> 👋</h2>
<p>This is your client dashboard.</p>
</div>

<div class="cards">
<div class="card">
<i class="fas fa-box"></i>
<h3>Your Orders</h3>
<p>View your recent orders</p>
</div>

<div class="card">
<i class="fas fa-user-edit"></i>
<h3>Edit Profile</h3>
<p>Update your account details</p>
</div>

<div class="card">
<i class="fas fa-headset"></i>
<h3>Support</h3>
<p>Contact our support team</p>
</div>
</div>

</div>

<script>

function toggleMenu(){
document.getElementById("mobileMenu").classList.toggle("active");
}

function logout(){
localStorage.removeItem("loggedUser");
window.location.href = "login.html";
}

function loadUser(){
let id = localStorage.getItem("loggedUser");
let users = JSON.parse(localStorage.getItem("maharviUsers")) || [];

let user = users.find(u => u.id === id);

if(!user){
window.location.href = "login.html";
return;
}

document.getElementById("userName").innerText = user.name;
}

loadUser();

</script>

</body>
</html>
