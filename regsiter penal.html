<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Maharvi Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;600&display=swap" rel="stylesheet">

<!-- Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Josefin Sans',sans-serif;
}

body{
display:flex;
background:#f4f6f9;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#7a3e22;
height:100vh;
color:#fff;
position:fixed;
left:0;
top:0;
padding:25px 15px;
transition:0.3s;
}

.sidebar h3{
text-align:center;
margin-bottom:30px;
}

.sidebar ul{
list-style:none;
}

.sidebar ul li{
padding:12px;
margin:10px 0;
cursor:pointer;
border-radius:6px;
transition:0.3s;
display:flex;
align-items:center;
gap:10px;
}

.sidebar ul li:hover{
background:rgba(255,255,255,0.2);
}

/* MAIN */

.main{
margin-left:240px;
flex:1;
padding:20px;
width:100%;
transition:0.3s;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
background:#fff;
padding:15px 20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
margin-bottom:20px;
}

.nav-left{
display:flex;
align-items:center;
gap:15px;
}

.menu-btn{
font-size:20px;
cursor:pointer;
display:none;
}

.nav-right{
display:flex;
align-items:center;
gap:20px;
}

.nav-right i{
cursor:pointer;
font-size:18px;
}

/* CARDS */

.cards{
display:flex;
gap:20px;
flex-wrap:wrap;
margin-bottom:25px;
}

.card{
flex:1;
min-width:200px;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card h3{
color:#7a3e22;
font-size:24px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
background:#fff;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

th,td{
padding:12px;
text-align:center;
}

th{
background:#7a3e22;
color:#fff;
}

tr:nth-child(even){
background:#f2f2f2;
}

button{
padding:6px 10px;
border:none;
border-radius:5px;
cursor:pointer;
font-weight:600;
}

.block{ background:#dc3545; color:#fff; }
.unblock{ background:#28a745; color:#fff; }
.delete{ background:#000; color:#fff; }

button:hover{
opacity:0.85;
}

/* RESPONSIVE */

@media(max-width:900px){

.sidebar{
left:-240px;
}

.sidebar.active{
left:0;
}

.main{
margin-left:0;
}

.menu-btn{
display:block;
}

}

</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<h3>MAHARVI ADMIN</h3>
<ul>
<li><i class="fas fa-chart-line"></i> Dashboard</li>
<li><i class="fas fa-users"></i> Customers</li>
<li><i class="fas fa-file-invoice"></i> Reports</li>
<li><i class="fas fa-sign-out-alt"></i> Logout</li>
</ul>
</div>

<!-- MAIN -->
<div class="main">

<div class="navbar">
<div class="nav-left">
<i class="fas fa-bars menu-btn" onclick="toggleMenu()"></i>
<h2>Dashboard</h2>
</div>

<div class="nav-right">
<i class="fas fa-bell"></i>
<i class="fas fa-user-circle"></i>
</div>
</div>

<!-- CARDS -->
<div class="cards">
<div class="card">
<h3 id="totalUsers">0</h3>
<p>Total Users</p>
</div>

<div class="card">
<h3 id="activeUsers">0</h3>
<p>Active Users</p>
</div>

<div class="card">
<h3 id="blockedUsers">0</h3>
<p>Blocked Users</p>
</div>
</div>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="userTable"></tbody>
</table>

</div>

<script>

function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active");
}

function loadUsers(){
let users = JSON.parse(localStorage.getItem("maharviUsers")) || [];
let table = document.getElementById("userTable");
table.innerHTML = "";

let active = 0;
let blocked = 0;

users.forEach((u,index)=>{

if(u.blocked) blocked++;
else active++;

table.innerHTML += `
<tr>
<td>${u.id}</td>
<td>${u.name}</td>
<td>${u.email}</td>
<td style="color:${u.blocked?'red':'green'}">
${u.blocked ? "Blocked" : "Active"}
</td>
<td>
<button class="${u.blocked?'unblock':'block'}"
onclick="toggleBlock(${index})">
${u.blocked?'Unblock':'Block'}
</button>
<button class="delete" onclick="deleteUser(${index})">
Delete
</button>
</td>
</tr>`;
});

document.getElementById("totalUsers").innerText = users.length;
document.getElementById("activeUsers").innerText = active;
document.getElementById("blockedUsers").innerText = blocked;
}

function toggleBlock(i){
let users = JSON.parse(localStorage.getItem("maharviUsers"));
users[i].blocked = !users[i].blocked;
localStorage.setItem("maharviUsers", JSON.stringify(users));
loadUsers();
}

function deleteUser(i){
if(confirm("Delete this user?")){
let users = JSON.parse(localStorage.getItem("maharviUsers"));
users.splice(i,1);
localStorage.setItem("maharviUsers", JSON.stringify(users));
loadUsers();
}
}

loadUsers();

</script>

</body>
</html>
